<!DOCTYPE html>
<html>
<head>
    <title>My Cart</title>
</head>
<body>
<style>
body {
    font-family: Arial, sans-serif;
    background: #ffe4ec;
    margin: 0;
    padding: 20px;
    text-align: center;
}

h2 {
    color: #d63384;
}

#cartItems {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-top: 20px;
}

.cart-card {
    background: white;
    padding: 15px;
    width: 250px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.cart-card:hover {
    transform: scale(1.05);
}

.cart-card h3 {
    margin: 10px 0;
    color: #333;
}

.cart-card p {
    color: #ff4d6d;
    font-weight: bold;
}
.clear-btn {
    background: #ff4d6d;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
}

.clear-btn:hover {
    background: #d63384;
}
.order-container {
    display: flex;
    justify-content: center;
    margin: 20px 0;
}

#placeOrderBtn {
    padding: 12px 25px;
    background-color: #ee85a5;
    color: white;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
}

#placeOrderBtn:hover {
    background-color: #ee7272;
}

/* Order form styles */
.order-form {
    display: none; /* hidden by default */
    max-width: 400px;
    margin: 20px auto;
    padding: 20px;
    border: 2px solid #ee85a5;
    border-radius: 15px;
    background-color: #fff0f5;
}

.order-form h2 {
    text-align: center;
    margin-bottom: 15px;
}

.order-form label {
    display: block;
    margin: 10px 0 5px;
}

.order-form input, 
.order-form textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ee85a5;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 10px;
}

.order-form button {
    width: 100%;
    padding: 12px;
    background-color: #ee85a5;
    color: white;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
}

.order-form button:hover {
    background-color: #ee7272;
}
</style>
<h2>🛒 Your Cart</h2>

<button onclick="clearCart()" class="clear-btn">Clear Cart 🗑</button>

<div id="cartItems"></div>

<div id="cartItems"></div>
<div class="order-container">
    <button id="placeOrderBtn">Place Order 🛒</button>
</div>

<!-- Hidden form -->
<div id="orderForm" class="order-form">
    <h2>Enter Your Details</h2>
    <label for="name">Full Name:</label>
    <input type="text" id="name" placeholder="John Doe" required>

    <label for="email">Email:</label>
    <input type="email" id="email" placeholder="example@email.com" required>

    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" placeholder="+91 9876543210" required>

    <label for="address">Address:</label>
    <textarea id="address" placeholder="Enter your full address" required></textarea>

    <button id="submitOrder">Submit Order</button>
</div>
<script>
    function clearCart() {
    localStorage.removeItem("cart");
    location.reload();
}
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container = document.getElementById("cartItems");

if(cart.length === 0){
    container.innerHTML = "<p>Your cart is empty 😢</p>";
} else {
    cart.forEach(item => {
        let div = document.createElement("div");
        div.innerHTML = `
            <h3>${item.name}</h3>
            <p>₹${item.price}</p>
            
            <hr>
        `;
        container.appendChild(div);
    });
}

const placeOrderBtn = document.getElementById('placeOrderBtn');
const orderForm = document.getElementById('orderForm');
const submitOrder = document.getElementById('submitOrder');

placeOrderBtn.addEventListener('click', () => {
    orderForm.style.display = 'block'; // show the form
    placeOrderBtn.scrollIntoView({ behavior: "smooth" });
});

submitOrder.addEventListener('click', () => {
    // Simple validation
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const address = document.getElementById('address').value;

    if (!name || !email || !phone || !address) {
        alert("Please fill all fields!");
        return;
    }

    
    alert(`Thank you, ${name}! Your order has been placed.\nWe will contact you soon.`);
    
    // Reset form
    orderForm.style.display = 'none';
    document.getElementById('name').value = '';
    document.getElementById('email').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('address').value = '';
});

</script>

</body>
</html>
